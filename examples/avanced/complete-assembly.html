<head>
    <title>Assembly Workshop</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script>
        delete AFRAME.components["grabbable"];
    </script>
    <script src="/dist/free-hands.min.js"></script>
</head>

<body>
    <a-scene background="color: #e9f1f7" xr-mode-ui="enabled: true" webxr="optionalFeatures: hand-tracking">
        <a-assets></a-assets>

        <!-- Luces -->
        <a-entity light="type: ambient; intensity: 0.7; color: #ffffff"></a-entity>
        <a-entity light="type: directional; intensity: 0.8; color: #ffffff" position="1 2 1"></a-entity>
        <a-entity light="type: directional; intensity: 0.4; color: #ffffff" position="-1 1 -1"></a-entity>

        <!-- Detectores -->
        <a-entity id="detector-pellizco"
            gesto-pellizco="hand:any; emitEachFrame:true; colliderType:obb-collider;"></a-entity>
        <a-entity id="detector-apuntar"
            gesto-apuntar="hand:any; emitEachFrame:true; colliderType:obb-collider;"></a-entity>
        <a-entity manos-esferas="useJointRadius:true; colorLeft:#39f; colorRight:#f93; opacity:0.85;"></a-entity>

        <!-- Camara -->
        <a-entity camera position="0 1.6 0"></a-entity>

        <!-- Mesa -->
        <a-plane id="table" position="0 0.7 -1" rotation="-90 0 0" width="1.8" height="1.1" color="#6a513f"></a-plane>
        <a-box id="table-edge" position="0 0.69 -1" width="1.85" height="0.04" depth="1.15" color="#3e2e23"></a-box>

        <!-- Panel UI -->
        <a-entity id="ui" position="0 1.35 -0.8">
            <a-plane id="panel" width="0.95" height="0.28" color="#0b1d2a" opacity="0.85"
                material="transparent: true"></a-plane>
            <a-entity id="instruction-text" position="0 0.07 0.01"
                text="value: Paso 1: pulsa el boton para iniciar; align: center; color: #ffffff; width: 1.9;"></a-entity>

            <a-box id="start-button" position="0 -0.06 0.03" width="0.55" height="0.14" depth="0.06" color="#1e90ff"
                material="roughness: 0.3; metalness: 0.1"
                clickable="maxClickers: 1; startGesture: pointstart; endGesture: pointend" hoverable></a-box>
            <a-entity id="start-text" position="0 -0.06 0.08"
                text="value: Iniciar Ensamblaje; align: center; color: #ffffff; width: 2.2;"></a-entity>
        </a-entity>

        <!-- Piezas -->
        <a-entity id="pieces" visible="false">
            <a-box id="piece-cube" class="piece cube" position="-0.5 0.85 -0.9" width="0.18" height="0.18" depth="0.18"
                color="#f39c12" material="roughness:0.3; metalness:0.2" grabbable draggable hoverable
                stretchable></a-box>

            <a-sphere id="piece-sphere" class="piece sphere" position="-0.25 0.85 -0.9" radius="0.12" color="#2ecc71"
                material="roughness:0.3; metalness:0.2" grabbable draggable hoverable stretchable></a-sphere>

            <a-box id="piece-rect" class="piece rect" position="0.05 0.85 -0.9" width="0.24" height="0.1" depth="0.1"
                color="#9b59b6" material="roughness:0.3; metalness:0.2" scale="0.6 0.6 0.6" grabbable draggable
                hoverable stretchable></a-box>
        </a-entity>

        <!-- Moldes -->
        <a-entity id="slots" visible="false">
            <a-plane id="mold-base" position="0.45 0.705 -1" rotation="-90 0 0" width="0.9" height="0.5"
                material="color:#00fff0; opacity:0.08; transparent:true"></a-plane>

            <a-box id="slot-cube" class="slot" position="0.1 0.8 -1" width="0.16" height="0.16" depth="0.16"
                material="color:#00fff0; opacity:0.25; transparent:true; emissive:#00fff0; emissiveIntensity:0.6"
                droppable="accepts: .piece.cube"></a-box>

            <a-sphere id="slot-sphere" class="slot" position="0.55 0.8 -1" radius="0.12"
                material="color:#00fff0; opacity:0.25; transparent:true; emissive:#00fff0; emissiveIntensity:0.6"
                droppable="accepts: .piece.sphere"></a-sphere>

            <a-box id="slot-rect" class="slot" position="0.9 0.8 -1" width="0.22" height="0.08" depth="0.08"
                material="color:#00fff0; opacity:0.25; transparent:true; emissive:#00fff0; emissiveIntensity:0.6"
                droppable="accepts: .piece.rect"></a-box>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const startText = document.querySelector('#start-text');
        const instructionText = document.querySelector('#instruction-text');
        const pieces = document.querySelector('#pieces');
        const slots = document.querySelector('#slots');

        const placed = new Set();
        let started = false;

        function setInstruction(text) {
            instructionText.setAttribute(
                'text',
                `value: ${text}; align: center; color: #ffffff; width: 1.9;`
            );
        }

        function getWorldSize(el) {
            el.object3D.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(el.object3D);
            const size = new THREE.Vector3();
            box.getSize(size);
            return size;
        }

        function isWithinSlot(piece, slot, tolerance = 0.25) {
            const ps = getWorldSize(piece);
            const ss = getWorldSize(slot);
            return (
                Math.abs(ps.x - ss.x) <= ss.x * tolerance &&
                Math.abs(ps.y - ss.y) <= ss.y * tolerance &&
                Math.abs(ps.z - ss.z) <= ss.z * tolerance
            );
        }

        function snapPieceToSlot(piece, slot) {
            const pos = slot.object3D.getWorldPosition(new THREE.Vector3());
            piece.object3D.position.copy(pos);
            piece.setAttribute('rotation', slot.getAttribute('rotation'));
            piece.removeAttribute('draggable');
            piece.removeAttribute('grabbable');
            piece.removeAttribute('hoverable');
            piece.removeAttribute('stretchable');
        }

        function handleDrop(slot, piece, totalSlots) {
            if (slot.id === 'slot-rect') {
                const ok = isWithinSlot(piece, slot, 0.25);
                if (!ok) {
                    setInstruction('Ajusta el rectangulo antes de soltar');
                    return;
                }
            }

            snapPieceToSlot(piece, slot);
            placed.add(slot.id);
            setInstruction(`Piezas colocadas: ${placed.size}/${totalSlots}`);

            if (placed.size === totalSlots) {
                startButton.setAttribute('color', '#2ecc71');
                startText.setAttribute(
                    'text',
                    'value: Completado; align: center; color: #ffffff; width: 2.2;'
                );
                setInstruction('Completado');
            }
        }

        setInstruction('Paso 1: pulsa el boton para iniciar');

        startButton.addEventListener('click-start', () => {
            if (started) return;
            started = true;
            pieces.setAttribute('visible', true);
            slots.setAttribute('visible', true);
            setInstruction('Paso 2: agarra piezas y ajusta el rectangulo');
        });

        startButton.addEventListener('hover-start', () => {
            if (!started) startButton.setAttribute('color', '#4aa3ff');
        });
        startButton.addEventListener('hover-end', () => {
            if (!started) startButton.setAttribute('color', '#1e90ff');
        });

        document.querySelectorAll('.piece').forEach((el) => {
            el.addEventListener('hover-start', () => {
                el.setAttribute('material', { emissive: '#ffffff', emissiveIntensity: 0.6 });
            });
            el.addEventListener('hover-end', () => {
                el.setAttribute('material', { emissive: '#000000', emissiveIntensity: 0.0 });
            });
        });

        const slotEls = Array.from(document.querySelectorAll('.slot'));
        const totalSlots = slotEls.length;

        slotEls.forEach((slot) => {
            slot.addEventListener('drag-drop', (e) => {
                if (!started) return;
                const piece = e.detail && e.detail.dropped;
                if (!piece) return;
                handleDrop(slot, piece, totalSlots);
            });
        });
    </script>
</body>
