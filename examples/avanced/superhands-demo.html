<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A-Frame Super Hands Component - Pointer Controls (Adaptado)</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>delete AFRAME.components["grabbable"];</script>

  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

  <script src="/dist/free-hands.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, .75);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      max-width: 360px;
      line-height: 1.3;
    }

    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }

    @keyframes octocat-wave {

      0%,
      100% {
        transform: rotate(0);
      }

      20%,
      60% {
        transform: rotate(-25deg);
      }

      40%,
      80% {
        transform: rotate(10deg);
      }
    }

    @media (max-width: 500px) {
      .github-corner:hover .octo-arm {
        animation: none;
      }

      .github-corner .octo-arm {
        animation: octocat-wave 560ms ease-in-out;
      }
    }
  </style>
</head>

<body>
  <div id="ui">
    Demo adaptada a tus gestos de mano. Misma disposición y comportamiento del ejemplo Super-Hands.
  </div>

  <a-scene environment="preset: default; shadow: true" xr-mode-ui="enabled: true"
    webxr="optionalFeatures: hand-tracking">

    <!-- Detectores -->
    <a-entity manos-esferas="enablePinch:true; enablePoint:true; gestureColliderType:obb-collider"></a-entity>

    <a-entity>
      <a-camera position="0 1.6 0"></a-camera>
    </a-entity>

    <!-- Cubos: mismas entidades, colores, posiciones y tamaño del ejemplo original -->
    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="0 1 -1.25" material="color: red">
    </a-entity>

    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="0 1.6 -1.5" material="color: red">
    </a-entity>

    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="-0.9 1 -0.9" material="color: blue">
    </a-entity>

    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="-1 1.6 -1" material="color: blue">
    </a-entity>

    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="0.9 1 -0.9" material="color: green">
    </a-entity>

    <a-entity class="cube" geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5" hoverable grabbable
      stretchable draggable droppable shadow position="1 1.6 -1" material="color: green">
    </a-entity>

    <!-- Misma entidad de enlace, pero sin imagen (sin foto local) -->
    <a-link href="../physics/" title="Physics Example" onmouseover="this.setAttribute('link', {highlighted: true})"
      onmouseout="this.setAttribute('link', {highlighted: false})" position="0 1.6 0.7" rotation="0 0 0"
      scale="0.25 0.25 0.25">
    </a-link>

    <a-light type="ambient" intensity="0.72"></a-light>
    <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
  </a-scene>

  <!-- GitHub Corner igual que el ejemplo -->
  <a href="https://github.com/c-frame/aframe-super-hands-component" class="github-corner">
    <svg width="80" height="80" viewBox="0 0 250 250"
      style="fill:#222; color:#fff; position:absolute; top:0; border:0; right:0;">
      <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
      <path
        d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
        fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
      <path
        d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
        fill="currentColor" class="octo-body"></path>
    </svg>
  </a>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cubes = document.querySelectorAll(".cube");

      cubes.forEach((el) => {
        // event-set__hoveron / hoveroff
        el.addEventListener("hover-start", () => {
          el.setAttribute("material", "opacity", 0.7);
          el.setAttribute("material", "transparent", true);
        });

        el.addEventListener("hover-end", () => {
          el.setAttribute("material", "opacity", 1);
          el.setAttribute("material", "transparent", false);
        });

        // event-set__dragon / dragoff (adaptado a estado dragover en tu droppable)
        el.addEventListener("stateadded", (e) => {
          const state = e.detail && e.detail.state ? e.detail.state : e.detail;
          if (state === "dragover") {
            el.setAttribute("material", "wireframe", true);
          }
        });

        el.addEventListener("stateremoved", (e) => {
          const state = e.detail && e.detail.state ? e.detail.state : e.detail;
          if (state === "dragover") {
            el.setAttribute("material", "wireframe", false);
          }
        });

        // event-set__dragdrop
        el.addEventListener("drag-drop", () => {
          el.setAttribute("geometry", "primitive", "sphere");
          el.setAttribute("geometry", "radius", 0.25);
          el.setAttribute("material", "wireframe", false);
        });
      });
    });
  </script>
</body>

</html>
