<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Pinch + Manos (Esferas)</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="/dist/free-hands.min.js"></script>
</head>

<body>
  <a-scene xr-mode-ui="enabled: true" webxr="optionalFeatures: hand-tracking">
    <a-camera position="0 1.6 2"></a-camera>

    <!-- Detectores -->
    <a-entity hands-spheres="enablePinch:true; enablePoint:false; gestureColliderType:obb-collider"></a-entity>

    <!-- Mensaje visual para feedback del gesto -->
    <a-text id="pinchMessage" position="0 1.9 -1.2" align="center" width="2.5" color="#AAAAFF"
      value="Haz un pellizco (pulgar + índice)">
    </a-text>

    <a-sky color="#02111f"></a-sky>
  </a-scene>
</body>

</html>
